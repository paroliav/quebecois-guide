<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Québécois — Survival Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --card: #1a1a1f;
    --border: #2a2a35;
    --accent: #e8c547;
    --accent2: #4fc3a1;
    --accent3: #f0836b;
    --text: #e8e6e0;
    --muted: #7a7870;
    --tag-bg: #22222a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 2rem 2rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; right: -80px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(232,197,71,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.6rem;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  h1 em { color: var(--accent); font-style: italic; }
  .header-sub {
    margin-top: 0.7rem;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
    max-width: 420px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    align-items: center;
    position: sticky;
    top: 0;
    background: rgba(13,13,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
    max-width: 320px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 0.55rem 0.9rem 0.55rem 2.2rem;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 0.65rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }
  .filter-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .filter-btn[data-cat="contractions"].active { background: #7b9cf5; border-color: #7b9cf5; color: #000; }
  .filter-btn[data-cat="conversation"].active { background: var(--accent2); border-color: var(--accent2); color: #000; }
  .filter-btn[data-cat="insults"].active { background: var(--accent3); border-color: var(--accent3); color: #000; }
  .filter-btn[data-cat="dictionary"].active { background: #b08de8; border-color: #b08de8; color: #000; }

  /* DAILY SPOTLIGHT */
  .spotlight {
    margin: 1.5rem 2rem;
    padding: 1.4rem 1.6rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    display: flex;
    gap: 1.2rem;
    align-items: flex-start;
    position: relative;
    overflow: hidden;
  }
  .spotlight::after {
    content: '★';
    position: absolute;
    right: 1.2rem;
    top: 1rem;
    font-size: 0.8rem;
    color: var(--accent);
    opacity: 0.6;
  }
  .spotlight-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.3rem;
  }
  .spotlight-phrase {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-style: italic;
    color: var(--accent);
    line-height: 1.2;
  }
  .spotlight-meaning {
    font-size: 0.9rem;
    color: var(--text);
    margin: 0.25rem 0;
  }
  .spotlight-example {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.3rem;
    font-style: italic;
  }
  .spotlight-num {
    font-family: 'DM Mono', monospace;
    font-size: 2.5rem;
    color: var(--border);
    font-weight: 500;
    flex-shrink: 0;
    line-height: 1;
    margin-top: 0.2rem;
  }

  /* COUNT */
  .count-bar {
    padding: 0.5rem 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
    margin: 0;
  }

  .card {
    background: var(--surface);
    padding: 1.2rem 1.4rem;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
  .card:hover { background: var(--card); }
  .card.expanded { background: var(--card); }

  .card-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--border);
    letter-spacing: 0.05em;
    position: absolute;
    top: 0.8rem;
    right: 0.9rem;
  }
  .card-cat-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
    margin-right: 0.3rem;
    vertical-align: middle;
  }
  .cat-contractions .card-cat-dot { background: #7b9cf5; }
  .cat-conversation .card-cat-dot { background: var(--accent2); }
  .cat-insults .card-cat-dot { background: var(--accent3); }
  .cat-dictionary .card-cat-dot { background: #b08de8; }

  .phrase {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-style: italic;
    color: var(--accent);
    line-height: 1.2;
    padding-right: 1.5rem;
  }
  .meaning {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
  }
  .formal {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .example {
    display: none;
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
    border-top: 1px solid var(--border);
    padding-top: 0.6rem;
    margin-top: 0.2rem;
    line-height: 1.5;
  }
  .card.expanded .example { display: block; }
  .example strong { color: var(--text); font-style: normal; font-weight: 400; }

  .no-results {
    grid-column: 1/-1;
    padding: 3rem 2rem;
    text-align: center;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }

  /* Responsive */
  @media (max-width: 600px) {
    header { padding: 1.8rem 1.2rem 1.4rem; }
    .controls { padding: 1rem 1.2rem; }
    .spotlight { margin: 1rem 1.2rem; }
    .count-bar { padding: 0.4rem 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Language Reference</div>

</header>

    <button class="filter-btn" data-cat="contractions">Contractions</button>
    <button class="filter-btn" data-cat="conversation">Conversation</button>
    <button class="filter-btn" data-cat="insults">Swears</button>

  </div>
</div>

</div>

// Spotlight: pick a random entry
const spotlight = data[Math.floor(Math.random() * data.length)];
document.getElementById('s-num').textContent = String(spotlight.id).padStart(2,'0');
document.getElementById('s-phrase').textContent = spotlight.phrase;
document.getElementById('s-meaning').textContent = spotlight.meaning;
document.getElementById('s-example').textContent = spotlight.example || '';
if (!spotlight.example) document.getElementById('s-example').style.display = 'none';

// Render
const grid = document.getElementById('grid');
const countBar = document.getElementById('count-bar');

let activeFilter = 'all';
let searchTerm = '';

function render() {
  const filtered = data.filter(item => {
    const matchCat = activeFilter === 'all' || item.cat === activeFilter;
    const q = searchTerm.toLowerCase();
    const matchSearch = !q || 
      item.phrase.toLowerCase().includes(q) || 
      item.meaning.toLowerCase().includes(q) || 
      (item.formal || '').toLowerCase().includes(q) ||
      (item.example || '').toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  countBar.textContent = filtered.length === data.length
    ? `Showing all ${data.length} entries`
    : `Showing ${filtered.length} of ${data.length}`;

  grid.innerHTML = '';
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No results found — try a different search.</div>';
    return;
  }

  filtered.forEach(item => {
    const div = document.createElement('div');
    div.className = `card cat-${item.cat}`;
    div.innerHTML = `
      <span class="card-num">#${item.id}</span>
      <div class="phrase"><span class="card-cat-dot"></span>${item.phrase}</div>
      <div class="meaning">${item.meaning}</div>
      ${item.formal ? `<div class="formal">FR: ${item.formal}</div>` : ''}
      ${item.example ? `<div class="example"><strong>Example:</strong> ${item.example}</div>` : ''}
    `;
    if (item.example) {
      div.addEventListener('click', () => div.classList.toggle('expanded'));
    }
    grid.appendChild(div);
  });
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    render();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

render();
</script>
